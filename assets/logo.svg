<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'>
  <defs>
    <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#9db8ff'/>
      <stop offset='100%' stop-color='#c084fc'/>
    </linearGradient>
    <filter id='glow' x='-20%' y='-20%' width='140%' height='140%'>
      <feGaussianBlur stdDeviation='1.8' result='blur'/>
      <feMerge>
        <feMergeNode in='blur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>
  <rect width='120' height='120' rx='26' fill='#07090d'/>
  <g fill='none' stroke='url(#g)' stroke-linejoin='round' opacity='0.9'>
    <!-- Skyline peaks -->
    <path d='M20 90 L26 78 L32 84 L38 72 L46 80 L54 68 L62 76 L70 64 L78 72 L86 62 L94 72 L100 66' stroke-width='2.2' stroke-linecap='round'/>
    <!-- Node dots -->
    <circle cx='36' cy='72' r='2.8' fill='#9db8ff' filter='url(#glow)'/>
    <circle cx='54' cy='68' r='2.2' fill='#c084fc' filter='url(#glow)'/>
    <circle cx='70' cy='64' r='3.2' fill='#9db8ff' filter='url(#glow)'/>
    <circle cx='86' cy='62' r='2.5' fill='#c084fc' filter='url(#glow)'/>
    <!-- Center emblem -->
    <circle cx='60' cy='46' r='14' stroke-width='2.6' opacity='0.95'/>
    <circle cx='60' cy='46' r='3.8' fill='url(#g)' filter='url(#glow)'/>
    <!-- Connecting arcs -->
    <path d='M34 84 L60 46 L86 72' stroke-width='1.4' opacity='0.6'/>
  </g>
</svg>
