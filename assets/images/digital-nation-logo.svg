<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b14"/>
      <stop offset="1" stop-color="#02040a"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e0fbff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#7df9ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#00c2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="480" height="480" fill="url(#bg)" rx="14"/>

  <!-- central connection -->
  <g>
    <circle cx="240" cy="240" r="54" fill="url(#orb)" filter="url(#glow)"/>
    <polygon points="240,204 258,222 258,258 240,276 222,258 222,222" fill="#050b14" stroke="#7df9ff" stroke-width="3"/>
    <polygon points="240,212 252,222 252,258 240,268 228,258 228,222" fill="#00c2ff" opacity="0.22"/>
    <circle cx="240" cy="240" r="9" fill="#7df9ff"/>
  </g>

  <!-- surrounding nodes -->
  <g>
    <g filter="url(#glow)">
      <circle cx="120" cy="100" r="22" fill="url(#orb)"/>
      <circle cx="370" cy="90" r="22" fill="url(#orb)"/>
      <circle cx="390" cy="260" r="22" fill="url(#orb)"/>
      <circle cx="310" cy="410" r="22" fill="url(#orb)"/>
      <circle cx="110" cy="380" r="22" fill="url(#orb)"/>
      <circle cx="70" cy="230" r="22" fill="url(#orb)"/>
    </g>

    <g fill="#050b14" stroke="#7df9ff" stroke-width="2.4">
      <polygon points="120,86 134,100 120,114 106,100"/>
      <polygon points="370,76 384,90 370,104 356,90"/>
      <polygon points="390,246 404,260 390,274 376,260"/>
      <polygon points="310,396 324,410 310,424 296,410"/>
      <polygon points="110,366 124,380 110,394 96,380"/>
      <polygon points="70,216 84,230 70,244 56,230"/>
    </g>
  </g>

  <!-- connections -->
  <g stroke="#7df9ff" stroke-opacity="0.55" stroke-width="1.4">
    <line x1="138" y1="116" x2="222" y2="224"/>
    <line x1="240" y1="204" x2="370" y2="104"/>
    <line x1="258" y1="222" x2="376" y2="252"/>
    <line x1="240" y1="276" x2="322" y2="398"/>
    <line x1="222" y1="258" x2="106" y2="376"/>
    <line x1="240" y1="240" x2="84" y2="228"/>
  </g>

  <!-- brand lockup -->
  <g transform="translate(0, 432)">
    <rect x="24" y="0" width="432" height="56" rx="12" fill="#050b14" stroke="#7df9ff" stroke-opacity="0.28" stroke-width="1"/>
    <circle cx="62" cy="28" r="7" fill="#7df9ff"/>
    <rect x="82" y="11" width="14" height="34" rx="4" fill="#00c2ff" opacity="0.9"/>
    <rect x="102" y="7" width="10" height="42" rx="4" fill="#7df9ff"/>
    <rect x="116" y="15" width="10" height="26" rx="4" fill="#00c2ff" opacity="0.9"/>
    <rect x="130" y="19" width="10" height="18" rx="4" fill="#7df9ff"/>
    <text x="162" y="35" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" font-weight="700" letter-spacing="4" fill="#e6f7fb">DIGITAL NATION</text>
    <text x="162" y="49" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="10" letter-spacing="2" fill="#7df9ff">PUBLIC INFRASTRUCTURE NETWORK</text>
  </g>
</svg>
