<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Nation — Hub</title>
  <meta name="description" content="The sovereign hub of the Digital Nation. Real-time neural substrate, trading desk, governance, and agent activity — orbital command center." />
  <meta property="og:title" content="Digital Nation — Hub" />
  <meta property="og:description" content="Portal to the Digital Nation: live quantum brain, trading desk, governance, and agent telemetry." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="/digital-nation-website/hub.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;700;900&family=Unbounded:wght@500;700;900&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;700;900&family=Unbounded:wght@500;700;900&display=swap" /></noscript>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    :root {
      --hub-bg: #04060b;
      --hub-surface: #0b0f18;
      --hub-border: rgba(122, 167, 255, 0.18);
      --hub-accent: #7aa7ff;
      --hub-accent-2: #c084fc;
      --hub-muted: rgba(230, 232, 235, 0.72);
      --hub-glow: rgba(122, 167, 255, 0.22);
      --hub-ring: rgba(192, 132, 252, 0.18);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--hub-bg);
      color: #e6e8eb;
    }

    .page-hub {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(1200px 800px at 50% 50%, rgba(122, 167, 255, 0.07), transparent 60%),
        radial-gradient(900px 600px at 20% 10%, rgba(192, 132, 252, 0.06), transparent 55%),
        radial-gradient(900px 600px at 80% 90%, rgba(52, 211, 153, 0.04), transparent 55%),
        var(--hub-bg);
    }

    /* starfield */
    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.35;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.15; transform: translateY(0); }
      to { opacity: 0.55; transform: translateY(-2px); }
    }

    /* orbital ring system */
    .orbit-system {
      position: relative;
      width: min(92vw, 92vh);
      height: min(92vw, 92vh);
      max-width: 1100px;
      max-height: 1100px;
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px dashed var(--hub-ring);
      animation: spin 60s linear infinite;
      pointer-events: none;
    }
    .orbit-ring--outer {
      inset: 6%;
      border-style: dotted;
      border-color: rgba(122, 167, 255, 0.12);
      animation-duration: 90s;
    }
    .orbit-ring--mid {
      inset: 18%;
      border-color: rgba(192, 132, 252, 0.16);
      animation-duration: 55s;
      animation-direction: reverse;
    }
    .orbit-ring--inner {
      inset: 30%;
      border-color: rgba(122, 167, 255, 0.14);
      animation-duration: 35s;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* center hub */
    .hub-core {
      position: absolute;
      inset: 32%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(122, 167, 255, 0.18), transparent 70%),
        var(--hub-surface);
      border: 1px solid var(--hub-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 4px;
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      z-index: 5;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hub-core:hover {
      transform: scale(1.03);
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.18),
        0 24px 70px rgba(0, 0, 0, 0.6),
        0 0 60px rgba(122, 167, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .hub-core__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 700;
      font-size: clamp(22px, 3.2vw, 42px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }
    .hub-core__sub {
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--hub-muted);
    }
    .hub-core__pulse {
      margin-top: 6px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
      animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    /* orbital nodes */
    .orbit-node {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(64px, 9.5vw, 96px);
      height: clamp(64px, 9.5vw, 96px);
      margin-left: clamp(-32px, -4.75vw, -48px);
      margin-top: clamp(-32px, -4.75vw, -48px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.07), transparent 60%),
        var(--hub-surface);
      border: 1px solid var(--hub-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 4px;
      padding: 6px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      z-index: 4;
    }
    .orbit-node:hover {
      transform: scale(1.12);
      border-color: rgba(122, 167, 255, 0.55);
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.15),
        0 0 30px rgba(122, 167, 255, 0.18),
        0 12px 30px rgba(0, 0, 0, 0.5);
    }
    .orbit-node__icon {
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1;
    }
    .orbit-node__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 600;
      font-size: clamp(8px, 0.95vw, 10px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.2;
    }
    .orbit-node__badge {
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--hub-muted);
      opacity: 0.9;
    }

    /* 8-node orbital positions */
    .orbit-node--0 { transform: rotate(0deg) translate(clamp(28vw, 38vh, 42vw)) rotate(0deg); }
    .orbit-node--1 { transform: rotate(45deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-45deg); }
    .orbit-node--2 { transform: rotate(90deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-90deg); }
    .orbit-node--3 { transform: rotate(135deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-135deg); }
    .orbit-node--4 { transform: rotate(180deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-180deg); }
    .orbit-node--5 { transform: rotate(225deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-225deg); }
    .orbit-node--6 { transform: rotate(270deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-270deg); }
    .orbit-node--7 { transform: rotate(315deg) translate(clamp(28vw, 38vh, 42vw)) rotate(-315deg); }

    /* spoke lines */
    .spoke {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1px;
      height: calc(clamp(28vw, 38vh, 42vw) - clamp(4vw, 6vh, 6vw));
      background: linear-gradient(to top, rgba(122, 167, 255, 0.35), rgba(192, 132, 252, 0.08));
      transform-origin: bottom center;
      pointer-events: none;
      z-index: 1;
    }
    .spoke--0 { transform: rotate(0deg); }
    .spoke--1 { transform: rotate(45deg); }
    .spoke--2 { transform: rotate(90deg); }
    .spoke--3 { transform: rotate(135deg); }
    .spoke--4 { transform: rotate(180deg); }
    .spoke--5 { transform: rotate(225deg); }
    .spoke--6 { transform: rotate(270deg); }
    .spoke--7 { transform: rotate(315deg); }

    /* telemetry bar at bottom */
    .telemetry-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid var(--hub-border);
      background: linear-gradient(to top, rgba(4, 6, 11, 0.95), rgba(4, 6, 11, 0));
      padding: 10px 0 12px;
      z-index: 10;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .telemetry-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--hub-muted);
    }
    .telemetry-item__value {
      color: #fff;
      font-weight: 500;
    }
    .telemetry-item__value--ok { color: #34d399; }
    .telemetry-item__value--bad { color: #f87171; }

    @media (max-width: 760px) {
      .orbit-system {
        width: 98vw;
        height: 98vw;
      }
      .orbit-node--0, .orbit-node--1, .orbit-node--2, .orbit-node--3,
      .orbit-node--4, .orbit-node--5, .orbit-node--6, .orbit-node--7 {
        transform: rotate(var(--angle)) translate(clamp(32vw, 42vh, 46vw)) rotate(calc(-1 * var(--angle)));
      }
      .spoke { display: none; }
    }
  </style>
</head>
<body class="page-hub">
  <div class="stars" aria-hidden="true" id="stars"></div>

  <div class="orbit-system">
    <!-- orbital rings -->
    <div class="orbit-ring orbit-ring--outer" aria-hidden="true"></div>
    <div class="orbit-ring orbit-ring--mid" aria-hidden="true"></div>
    <div class="orbit-ring orbit-ring--inner" aria-hidden="true"></div>

    <!-- spokes -->
    <div class="spoke spoke--0" aria-hidden="true"></div>
    <div class="spoke spoke--1" aria-hidden="true"></div>
    <div class="spoke spoke--2" aria-hidden="true"></div>
    <div class="spoke spoke--3" aria-hidden="true"></div>
    <div class="spoke spoke--4" aria-hidden="true"></div>
    <div class="spoke spoke--5" aria-hidden="true"></div>
    <div class="spoke spoke--6" aria-hidden="true"></div>
    <div class="spoke spoke--7" aria-hidden="true"></div>

    <!-- core hub -->
    <a class="hub-core" href="/digital-nation-website/index-legacy.html" aria-label="Digital Nation home">
      <div class="hub-core__title">Hub</div>
      <div class="hub-core__sub">Digital Nation</div>
      <div class="hub-core__pulse" aria-hidden="true"></div>
    </a>

    <!-- orbital nodes -->
    <a class="orbit-node orbit-node--0" href="http://localhost:8086/" target="_blank" rel="noopener noreferrer" aria-label="4D Quantum Thought Engine">
      <div class="orbit-node__icon">🧠</div>
      <div class="orbit-node__title">Lattice Brain</div>
      <div class="orbit-node__badge">Live</div>
    </a>

    <a class="orbit-node orbit-node--1" href="http://localhost:8100/" target="_blank" rel="noopener noreferrer" aria-label="Trading Desk">
      <div class="orbit-node__icon">📈</div>
      <div class="orbit-node__title">Trading Desk</div>
      <div class="orbit-node__badge">Paper</div>
    </a>

    <a class="orbit-node orbit-node--2" href="/digital-nation-website/protocol-status.html" aria-label="Governance and IAMS">
      <div class="orbit-node__icon">🏛️</div>
      <div class="orbit-node__title">Governance</div>
      <div class="orbit-node__badge">Ops</div>
    </a>

    <a class="orbit-node orbit-node--3" href="/digital-nation-website/quantum-roadmap.html" aria-label="Quantum Roadmap">
      <div class="orbit-node__icon">🗺️</div>
      <div class="orbit-node__title">Roadmap</div>
      <div class="orbit-node__badge">Planned</div>
    </a>

    <a class="orbit-node orbit-node--4" href="http://localhost:8091/mcp" target="_blank" rel="noopener noreferrer" aria-label="HyperLattice MCP">
      <div class="orbit-node__icon">🔗</div>
      <div class="orbit-node__title">HL MCP</div>
      <div class="orbit-node__badge">Memory</div>
    </a>

    <a class="orbit-node orbit-node--5" href="/digital-nation-website/index-legacy.html" aria-label="Legacy landing page">
      <div class="orbit-node__icon">📜</div>
      <div class="orbit-node__title">Legacy</div>
      <div class="orbit-node__badge">Static</div>
    </a>

    <a class="orbit-node orbit-node--6" href="/digital-nation-website/structure.html" aria-label="Government structure">
      <div class="orbit-node__icon">🏗️</div>
      <div class="orbit-node__title">Structure</div>
      <div class="orbit-node__badge">Gov</div>
    </a>

    <a class="orbit-node orbit-node--7" href="/digital-nation-website/ecosystem-status.html" aria-label="Ecosystem status">
      <div class="orbit-node__icon">🌐</div>
      <div class="orbit-node__title">Ecosystem</div>
      <div class="orbit-node__badge">Status</div>
    </a>
  </div>

  <!-- live telemetry strip -->
  <div class="telemetry-bar" aria-label="Live system telemetry">
    <div class="telemetry-item">
      <span>Brain</span>
      <span class="telemetry-item__value" id="svc-brain">—</span>
    </div>
    <div class="telemetry-item">
      <span>Desk</span>
      <span class="telemetry-item__value" id="svc-desk">—</span>
    </div>
    <div class="telemetry-item">
      <span>HL MCP</span>
      <span class="telemetry-item__value" id="svc-hl">—</span>
    </div>
    <div class="telemetry-item">
      <span>Equity</span>
      <span class="telemetry-item__value" id="desk-equity">—</span>
    </div>
    <div class="telemetry-item">
      <span>Positions</span>
      <span class="telemetry-item__value" id="desk-positions">—</span>
    </div>
    <div class="telemetry-item">
      <span>Realized</span>
      <span class="telemetry-item__value" id="desk-realized">—</span>
    </div>
    <div class="telemetry-item">
      <span>Directives</span>
      <span class="telemetry-item__value" id="directives-count">—</span>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // starfield
      const stars = document.getElementById('stars');
      for (let i = 0; i < 70; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = (Math.random() * 4) + 's';
        s.style.opacity = Math.random() * 0.35 + 0.1;
        stars.appendChild(s);
      }

      const endpoints = {
        hl: 'http://localhost:8090/health',
        desk: 'http://localhost:8100/api/health',
        brain: 'http://localhost:8086/health',
        deskEquity: 'http://localhost:8100/api/status',
        presidentialDirectives: '/.hermes/presidential_directives.log'
      };

      function setVal(id, healthy, text) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        el.className = 'telemetry-item__value' + (healthy === false ? ' telemetry-item__value--bad' : healthy === true ? ' telemetry-item__value--ok' : '');
      }

      async function fetchJSON(url, fallback) {
        try {
          const r = await fetch(url, { mode: 'cors' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return await r.json();
        } catch (e) {
          return fallback;
        }
      }

      async function fetchText(url, fallback) {
        try {
          const r = await fetch(url, { mode: 'cors' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return await r.text();
        } catch (e) {
          return fallback;
        }
      }

      async function refresh() {
        const hl = await fetchJSON(endpoints.hl, { status: '' });
        const desk = await fetchJSON(endpoints.desk, { status: '' });
        const brain = await fetchJSON(endpoints.brain, { status: '' });

        setVal('svc-hl', !!hl.status, hl.status ? 'online' : 'down');
        setVal('svc-desk', !!desk.status, desk.status ? 'online' : 'down');
        setVal('svc-brain', !!brain.status, brain.status ? 'online' : 'down');

        try {
          const status = await fetchJSON(endpoints.deskEquity, {});
          const equity = status.equityUsd ?? status.equity ?? '—';
          const positions = status.openPositions ?? status.open ?? '—';
          const realized = status.realizedPnlUsd ?? status.realized ?? '—';
          setVal('desk-equity', null, '$' + equity);
          setVal('desk-positions', null, '' + positions);
          setVal('desk-realized', null, '$' + realized);
        } catch (e) {
          setVal('desk-equity', false, '—');
          setVal('desk-positions', false, '—');
          setVal('desk-realized', false, '—');
        }

        try {
          const text = await fetchText(endpoints.presidentialDirectives, '');
          const lines = text.split('\n').filter(Boolean);
          setVal('directives-count', null, '' + lines.length);
        } catch (e) {
          setVal('directives-count', false, '—');
        }
      }

      refresh();
      setInterval(refresh, 30000);
    })();
  </script>
</body>
