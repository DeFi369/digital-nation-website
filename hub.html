  <style>
    :root {
      --hub-bg: #020408;
      --hub-surface: #0a0f1a;
      --hub-border: rgba(122, 167, 255, 0.22);
      --hub-accent: #7aa7ff;
      --hub-accent-2: #c084fc;
      --hub-muted: rgba(230, 232, 235, 0.78);
      --hub-glow: rgba(122, 167, 255, 0.35);
      --hub-ring: rgba(192, 132, 252, 0.22);
      --hub-nebula-a: rgba(122, 167, 255, 0.08);
      --hub-nebula-b: rgba(192, 132, 252, 0.07);
      --hub-nebula-c: rgba(52, 211, 153, 0.05);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--hub-bg);
      color: #e6e8eb;
    }

    .page-hub {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(1200px 900px at 50% 45%, var(--hub-nebula-a), transparent 60%),
        radial-gradient(900px 700px at 15% 15%, var(--hub-nebula-b), transparent 55%),
        radial-gradient(900px 700px at 85% 85%, var(--hub-nebula-c), transparent 55%),
        var(--hub-bg);
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.4;
      animation: twinkle 5s ease-in-out infinite alternate;
    }
    .star--bright {
      width: 3px;
      height: 3px;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
      opacity: 0.85;
    }
    @keyframes twinkle {
      from { opacity: 0.12; transform: translateY(0); }
      to { opacity: 0.7; transform: translateY(-3px); }
    }

    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      pointer-events: none;
    }
    .nebula--a {
      width: 700px; height: 500px; left: -180px; top: -140px;
      background: radial-gradient(closest-side, rgba(122, 167, 255, 0.18), transparent 70%);
      animation: drift 28s ease-in-out infinite alternate;
    }
    .nebula--b {
      width: 750px; height: 550px; right: -200px; bottom: -160px;
      background: radial-gradient(closest-side, rgba(192, 132, 252, 0.16), transparent 70%);
      animation: drift 34s ease-in-out infinite alternate-reverse;
    }
    .nebula--c {
      width: 500px; height: 400px; left: 30%; top: 40%;
      background: radial-gradient(closest-side, rgba(52, 211, 153, 0.08), transparent 70%);
      animation: drift 22s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(40px, 25px, 0) scale(1.1); }
    }

    .orbit-system {
      position: relative;
      width: min(94vw, 94vh);
      height: min(94vw, 94vh);
      max-width: 1200px;
      max-height: 1200px;
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px dashed var(--hub-ring);
      animation: spin 80s linear infinite;
      pointer-events: none;
      box-shadow: 0 0 18px rgba(122, 167, 255, 0.06), inset 0 0 18px rgba(122, 167, 255, 0.03);
    }
    .orbit-ring--outer {
      inset: 4%;
      border-style: dotted;
      border-color: rgba(122, 167, 255, 0.14);
      animation-duration: 110s;
    }
    .orbit-ring--mid {
      inset: 16%;
      border-color: rgba(192, 132, 252, 0.18);
      animation-duration: 70s;
      animation-direction: reverse;
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.08), inset 0 0 22px rgba(192, 132, 252, 0.04);
    }
    .orbit-ring--inner {
      inset: 28%;
      border-color: rgba(122, 167, 255, 0.16);
      animation-duration: 45s;
      box-shadow: 0 0 20px rgba(122, 167, 255, 0.1), inset 0 0 20px rgba(122, 167, 255, 0.05);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hub-core {
      position: absolute;
      inset: 34%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.09), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(122, 167, 255, 0.22), transparent 70%),
        var(--hub-surface);
      border: 1px solid var(--hub-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.1),
        0 24px 70px rgba(0, 0, 0, 0.7),
        0 0 90px rgba(122, 167, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 5;
      text-decoration: none;
      cursor: pointer;
      color: inherit;
      transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease;
    }
    .hub-core:hover {
      transform: scale(1.04);
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.22),
        0 28px 80px rgba(0, 0, 0, 0.75),
        0 0 120px rgba(122, 167, 255, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }
    .hub-core__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 700;
      font-size: clamp(24px, 3.2vw, 44px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }
    .hub-core__sub {
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: clamp(8px, 1vw, 10px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--hub-muted);
    }
    .hub-core__pulse {
      margin-top: 8px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.8);
      animation: pulse-ring 2.2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.8); }
      70% { box-shadow: 0 0 0 12px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    .orbit-carousel {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transition: transform 0.7s cubic-bezier(.2,.8,.2,1);
    }

    .orbit-node-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      pointer-events: none;
    }
    .orbit-node-wrap--0 { transform: rotate(0deg) translate(clamp(16vw, 22vh, 26vw)) rotate(0deg); }
    .orbit-node-wrap--1 { transform: rotate(45deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-45deg); }
    .orbit-node-wrap--2 { transform: rotate(90deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-90deg); }
    .orbit-node-wrap--3 { transform: rotate(135deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-135deg); }
    .orbit-node-wrap--4 { transform: rotate(180deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-180deg); }
    .orbit-node-wrap--5 { transform: rotate(225deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-225deg); }
    .orbit-node-wrap--6 { transform: rotate(270deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-270deg); }
    .orbit-node-wrap--7 { transform: rotate(315deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-315deg); }

    .orbit-node {
      position: relative;
      left: clamp(-28px, -4.2vw, -42px);
      top: clamp(-28px, -4.2vw, -42px);
      width: clamp(56px, 8.4vw, 84px);
      height: clamp(56px, 8.4vw, 84px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), transparent 60%),
        var(--hub-surface);
      border: 1px solid var(--hub-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 3px;
      padding: 6px;
      text-decoration: none;
      color: inherit;
      pointer-events: auto;
      transition: transform 0.3s cubic-bezier(.2,.8,.2,1), border-color 0.25s ease, box-shadow 0.25s ease;
      animation: float 6s ease-in-out infinite;
      --node-hue: 215;
      --node-glow: rgba(122,167,255,0.3);
    }
    .orbit-node--theme-a { --node-hue: 215; --node-glow: rgba(122,167,255,0.35); }
    .orbit-node--theme-b { --node-hue: 270; --node-glow: rgba(192,132,252,0.35); }
    .orbit-node--theme-c { --node-hue: 160; --node-glow: rgba(52,211,153,0.35); }
    .orbit-node--theme-d { --node-hue: 35; --node-glow: rgba(250,204,21,0.35); }
    .orbit-node--theme-e { --node-hue: 0; --node-glow: rgba(248,113,113,0.35); }
    .orbit-node__icon { filter: drop-shadow(0 0 6px var(--node-glow)); }
    .orbit-node:nth-child(odd) { animation-duration: 7.2s; }
    .orbit-node:nth-child(even) { animation-duration: 5.6s; animation-direction: reverse; }
    .orbit-node:hover {
      transform: scale(1.18) translateY(-4px);
      border-color: hsl(var(--node-hue), 70%, 55%);
      box-shadow:
        0 0 0 1px hsl(var(--node-hue), 70%, 55%),
        0 0 40px hsl(var(--node-hue), 70%, 55%, 0.35),
        0 16px 40px rgba(0, 0, 0, 0.55);
      animation-play-state: paused;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .orbit-node__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 600;
      font-size: clamp(7px, 0.85vw, 9px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.2;
    }
    .orbit-node__badge {
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 7px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--hub-muted);
      opacity: 0.9;
    }

    .spoke {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: calc(clamp(16vw, 22vh, 26vw) - clamp(6vw, 8vh, 9vw));
      transform-origin: bottom center;
      pointer-events: none;
      z-index: 1;
    }
    .spoke--0 { transform: rotate(0deg); background: linear-gradient(to top, rgba(122,167,255,0.6), rgba(52,211,153,0.18)); box-shadow: 0 0 10px rgba(122,167,255,0.18); }
    .spoke--1 { transform: rotate(45deg); background: linear-gradient(to top, rgba(192,132,252,0.6), rgba(248,113,113,0.18)); box-shadow: 0 0 10px rgba(192,132,252,0.18); }
    .spoke--2 { transform: rotate(90deg); background: linear-gradient(to top, rgba(52,211,153,0.6), rgba(122,167,255,0.18)); box-shadow: 0 0 10px rgba(52,211,153,0.18); }
    .spoke--3 { transform: rotate(135deg); background: linear-gradient(to top, rgba(248,113,113,0.5), rgba(250,204,21,0.18)); box-shadow: 0 0 10px rgba(248,113,113,0.15); }
    .spoke--4 { transform: rotate(180deg); background: linear-gradient(to top, rgba(122,167,255,0.6), rgba(192,132,252,0.18)); box-shadow: 0 0 10px rgba(122,167,255,0.18); }
    .spoke--5 { transform: rotate(225deg); background: linear-gradient(to top, rgba(250,204,21,0.5), rgba(52,211,153,0.18)); box-shadow: 0 0 10px rgba(250,204,21,0.15); }
    .spoke--6 { transform: rotate(270deg); background: linear-gradient(to top, rgba(192,132,252,0.6), rgba(122,167,255,0.18)); box-shadow: 0 0 10px rgba(192,132,252,0.18); }
    .spoke--7 { transform: rotate(315deg); background: linear-gradient(to top, rgba(52,211,153,0.6), rgba(248,113,113,0.18)); box-shadow: 0 0 10px rgba(52,211,153,0.18); }

    .telemetry-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid var(--hub-border);
      background: linear-gradient(to top, rgba(2, 4, 8, 0.96), rgba(2, 4, 8, 0));
      padding: 10px 0 12px;
      z-index: 10;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .telemetry-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--hub-muted);
      text-shadow: 0 0 10px rgba(122, 167, 255, 0.15);
    }
    .telemetry-item__value {
      color: #fff;
      font-weight: 500;
      text-decoration: none;
    }
    .telemetry-item__value:hover {
      text-shadow: 0 0 12px rgba(122, 167, 255, 0.4);
    }

    .mcp-terminal {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(2, 4, 8, 0.85);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .mcp-terminal.is-open { display: flex; }
    .mcp-terminal__frame {
      width: min(860px, 94vw);
      height: min(520px, 70vh);
      background: var(--hub-surface);
      border: 1px solid var(--hub-border);
      border-radius: 14px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .mcp-terminal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--hub-border);
      background: rgba(122, 167, 255, 0.04);
    }
    .mcp-terminal__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
    }
    .mcp-terminal__close {
      background: transparent;
      border: 1px solid var(--hub-border);
      color: var(--hub-muted);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 11px;
      cursor: pointer;
    }
    .mcp-terminal__close:hover { border-color: rgba(122, 167, 255, 0.4); color: #fff; }
    .mcp-terminal__body {
      flex: 1;
      overflow: hidden;
    }
    .mcp-terminal__body iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #05070a;
    }

    @media (max-width: 760px) {
      .orbit-node-wrap--0, .orbit-node-wrap--1, .orbit-node-wrap--2, .orbit-node-wrap--3,
      .orbit-node-wrap--4, .orbit-node-wrap--5, .orbit-node-wrap--6, .orbit-node-wrap--7 {
        transform: rotate(var(--angle)) translate(clamp(26vw, 36vh, 40vw)) rotate(calc(-1 * var(--angle)));
      }
      .spoke { display: none; }
    }
  </style>

        <iframe src="http://localhost:8091/" title="HyperLattice MCP terminal" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const stars = document.getElementById('stars');
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star' + (Math.random() < 0.12 ? ' star--bright' : '');
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = (Math.random() * 5) + 's';
        s.style.opacity = Math.random() * 0.4 + 0.1;
        stars.appendChild(s);
      }

      const carousel = document.getElementById('orbit-carousel');
      const hubSpin = document.getElementById('hub-spin');
      let spinAngle = 0;
      let holdTimer = null;
      let holdInterval = null;

      function setNodeTransform(wrap, index, angle) {
        const base = index * 45;
        const r1 = base - angle;
        const r2 = -r1;
        wrap.style.transform = 'rotate(' + r1 + 'deg) translate(clamp(16vw, 22vh, 26vw)) rotate(' + r2 + 'deg)';
      }

      function applySpin(angle) {
        spinAngle = angle;
        if (carousel) carousel.style.transform = 'rotate(' + spinAngle + 'deg)';
        const nodes = document.querySelectorAll('.orbit-node-wrap');
        nodes.forEach(function (w, i) {
          setNodeTransform(w, i, spinAngle);
        });
      }

      function startHold() {
        applySpin(spinAngle - 15);
        holdTimer = setTimeout(function () {
          holdInterval = setInterval(function () {
            applySpin(spinAngle - 20);
          }, 40);
        }, 180);
      }

      function stopHold() {
        clearTimeout(holdTimer);
        clearInterval(holdInterval);
        holdTimer = null;
        holdInterval = null;
        snapToGrid();
      }

      function snapToGrid() {
        const snapped = Math.round(spinAngle / 45) * 45;
        applySpin(snapped);
      }

      applySpin(0);

      if (hubSpin) {
        hubSpin.addEventListener('click', function (e) {
          e.preventDefault();
          stopHold();
          applySpin(spinAngle - 45);
        });
        hubSpin.addEventListener('mousedown', startHold);
        hubSpin.addEventListener('mouseup', stopHold);
        hubSpin.addEventListener('mouseleave', stopHold);
        hubSpin.addEventListener('touchstart', function (e) { e.preventDefault(); startHold(); }, { passive: false });
        hubSpin.addEventListener('touchend', function () { stopHold(); });
      }

      const mcpTerminal = null;
      const mcpClose = null;
      const mcpNode = null;
      if (false && mcpNode && mcpTerminal) {
        mcpNode.addEventListener('click', function (e) {
          e.preventDefault();
          mcpTerminal.classList.add('is-open');
          mcpTerminal.setAttribute('aria-hidden', 'false');
        });
      }
      if (false && mcpClose && mcpTerminal) {
        mcpClose.addEventListener('click', function () {
          mcpTerminal.classList.remove('is-open');
          mcpTerminal.setAttribute('aria-hidden', 'true');
        });
      }
    })();
  </script>
</body>
</html>
