<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Nation — Hub</title>
  <meta name="description" content="The sovereign hub of the Digital Nation. Real-time neural substrate, trading desk, governance, and agent activity — orbital command center." />
  <meta property="og:title" content="Digital Nation — Hub" />
  <meta property="og:description" content="Portal to the Digital Nation: live quantum brain, trading desk, governance, and agent telemetry." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="/digital-nation-website/hub.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;700;900&family=Unbounded:wght@500;700;900&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;700;900&family=Unbounded:wght@500;700;900&display=swap" /></noscript>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    :root {
      --hub-bg: #020408;
      --hub-surface: #0a0f1a;
      --hub-border: rgba(122, 167, 255, 0.22);
      --hub-accent: #7aa7ff;
      --hub-accent-2: #c084fc;
      --hub-muted: rgba(230, 232, 235, 0.78);
      --hub-glow: rgba(122, 167, 255, 0.35);
      --hub-ring: rgba(192, 132, 252, 0.22);
      --hub-nebula-a: rgba(122, 167, 255, 0.08);
      --hub-nebula-b: rgba(192, 132, 252, 0.07);
      --hub-nebula-c: rgba(52, 211, 153, 0.05);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--hub-bg);
      color: #e6e8eb;
    }

    .page-hub {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(1200px 900px at 50% 45%, var(--hub-nebula-a), transparent 60%),
        radial-gradient(900px 700px at 15% 15%, var(--hub-nebula-b), transparent 55%),
        radial-gradient(900px 700px at 85% 85%, var(--hub-nebula-c), transparent 55%),
        var(--hub-bg);
    }

    /* deeper starfield */
    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.4;
      animation: twinkle 5s ease-in-out infinite alternate;
    }
    .star--bright {
      width: 3px;
      height: 3px;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
      opacity: 0.85;
    }
    @keyframes twinkle {
      from { opacity: 0.12; transform: translateY(0); }
      to { opacity: 0.7; transform: translateY(-3px); }
    }

    /* nebula clouds */
    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      pointer-events: none;
    }
    .nebula--a {
      width: 700px; height: 500px; left: -180px; top: -140px;
      background: radial-gradient(closest-side, rgba(122, 167, 255, 0.18), transparent 70%);
      animation: drift 28s ease-in-out infinite alternate;
    }
    .nebula--b {
      width: 750px; height: 550px; right: -200px; bottom: -160px;
      background: radial-gradient(closest-side, rgba(192, 132, 252, 0.16), transparent 70%);
      animation: drift 34s ease-in-out infinite alternate-reverse;
    }
    .nebula--c {
      width: 500px; height: 400px; left: 30%; top: 40%;
      background: radial-gradient(closest-side, rgba(52, 211, 153, 0.08), transparent 70%);
      animation: drift 22s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(40px, 25px, 0) scale(1.1); }
    }

    /* orbital ring system */
    .orbit-system {
      position: relative;
      width: min(94vw, 94vh);
      height: min(94vw, 94vh);
      max-width: 1200px;
      max-height: 1200px;
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px dashed var(--hub-ring);
      animation: spin 80s linear infinite;
      pointer-events: none;
      box-shadow: 0 0 18px rgba(122, 167, 255, 0.06), inset 0 0 18px rgba(122, 167, 255, 0.03);
    }
    .orbit-ring--outer {
      inset: 4%;
      border-style: dotted;
      border-color: rgba(122, 167, 255, 0.14);
      animation-duration: 110s;
    }
    .orbit-ring--mid {
      inset: 16%;
      border-color: rgba(192, 132, 252, 0.18);
      animation-duration: 70s;
      animation-direction: reverse;
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.08), inset 0 0 22px rgba(192, 132, 252, 0.04);
    }
    .orbit-ring--inner {
      inset: 28%;
      border-color: rgba(122, 167, 255, 0.16);
      animation-duration: 45s;
      box-shadow: 0 0 20px rgba(122, 167, 255, 0.1), inset 0 0 20px rgba(122, 167, 255, 0.05);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* center hub */
    .hub-core {
      position: absolute;
      inset: 34%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.09), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(122, 167, 255, 0.22), transparent 70%),
        var(--hub-surface);
      border: 1px solid var(--hub-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.1),
        0 24px 70px rgba(0, 0, 0, 0.7),
        0 0 90px rgba(122, 167, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 5;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease;
      cursor: pointer;
    }
    .hub-core:hover {
      transform: scale(1.04);
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.22),
        0 28px 80px rgba(0, 0, 0, 0.75),
        0 0 120px rgba(122, 167, 255, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }
    .hub-core__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 700;
      font-size: clamp(24px, 3.2vw, 44px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }
    .hub-core__sub {
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: clamp(8px, 1vw, 10px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--hub-muted);
    }
    .hub-core__pulse {
      margin-top: 8px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.8);
      animation: pulse-ring 2.2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.8); }
      70% { box-shadow: 0 0 0 12px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    /* carousel rotates all nodes around the center */
    .orbit-carousel {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transition: transform 0.7s cubic-bezier(.2,.8,.2,1);
    }

    /* orbital node wrapper handles positioning */
    .orbit-node-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      pointer-events: none;
    }
    .orbit-node-wrap--0 { transform: rotate(0deg) translate(clamp(16vw, 22vh, 26vw)) rotate(0deg); }
    .orbit-node-wrap--1 { transform: rotate(45deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-45deg); }
    .orbit-node-wrap--2 { transform: rotate(90deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-90deg); }
    .orbit-node-wrap--3 { transform: rotate(135deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-135deg); }
    .orbit-node-wrap--4 { transform: rotate(180deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-180deg); }
    .orbit-node-wrap--5 { transform: rotate(225deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-225deg); }
    .orbit-node-wrap--6 { transform: rotate(270deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-270deg); }
    .orbit-node-wrap--7 { transform: rotate(315deg) translate(clamp(16vw, 22vh, 26vw)) rotate(-315deg); }

    .orbit-node {
      position: relative;
      left: clamp(-28px, -4.2vw, -42px);
      top: clamp(-28px, -4.2vw, -42px);
      width: clamp(56px, 8.4vw, 84px);
      height: clamp(56px, 8.4vw, 84px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), transparent 60%),
        var(--hub-surface);
      border: 1px solid var(--hub-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 3px;
      padding: 6px;
      text-decoration: none;
      color: inherit;
      pointer-events: auto;
      transition: transform 0.3s cubic-bezier(.2,.8,.2,1), border-color 0.25s ease, box-shadow 0.25s ease;
      animation: float 6s ease-in-out infinite;
    }
    .orbit-node:nth-child(odd) { animation-duration: 7.2s; }
    .orbit-node:nth-child(even) { animation-duration: 5.6s; animation-direction: reverse; }
    .orbit-node:hover {
      transform: scale(1.18) translateY(-4px);
      border-color: rgba(122, 167, 255, 0.6);
      box-shadow:
        0 0 0 1px rgba(122, 167, 255, 0.18),
        0 0 40px rgba(122, 167, 255, 0.22),
        0 16px 40px rgba(0, 0, 0, 0.55);
      animation-play-state: paused;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .orbit-node__icon {
      font-size: clamp(16px, 1.8vw, 22px);
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(122, 167, 255, 0.3));
    }
    .orbit-node__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 600;
      font-size: clamp(7px, 0.85vw, 9px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.2;
    }
    .orbit-node__badge {
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 7px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--hub-muted);
      opacity: 0.9;
    }

    /* spoke lines */
    .spoke {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1px;
      height: calc(clamp(16vw, 22vh, 26vw) - clamp(6vw, 8vh, 9vw));
      background: linear-gradient(to top, rgba(122, 167, 255, 0.4), rgba(192, 132, 252, 0.08));
      transform-origin: bottom center;
      pointer-events: none;
      z-index: 1;
    }
    .spoke--0 { transform: rotate(0deg); }
    .spoke--1 { transform: rotate(45deg); }
    .spoke--2 { transform: rotate(90deg); }
    .spoke--3 { transform: rotate(135deg); }
    .spoke--4 { transform: rotate(180deg); }
    .spoke--5 { transform: rotate(225deg); }
    .spoke--6 { transform: rotate(270deg); }
    .spoke--7 { transform: rotate(315deg); }

    /* telemetry bar */
    .telemetry-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid var(--hub-border);
      background: linear-gradient(to top, rgba(2, 4, 8, 0.96), rgba(2, 4, 8, 0));
      padding: 10px 0 12px;
      z-index: 10;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .telemetry-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--hub-muted);
      text-shadow: 0 0 10px rgba(122, 167, 255, 0.15);
    }
    .telemetry-item__value {
      color: #fff;
      font-weight: 500;
    }
    .telemetry-item__value--ok { color: #34d399; text-shadow: 0 0 12px rgba(52, 211, 153, 0.5); }
    .telemetry-item__value--bad { color: #f87171; text-shadow: 0 0 12px rgba(248, 113, 113, 0.5); }

    /* mcp terminal modal */
    .mcp-terminal {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(2, 4, 8, 0.85);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .mcp-terminal.is-open { display: flex; }
    .mcp-terminal__frame {
      width: min(860px, 94vw);
      height: min(520px, 70vh);
      background: var(--hub-surface);
      border: 1px solid var(--hub-border);
      border-radius: 14px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .mcp-terminal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--hub-border);
      background: rgba(122, 167, 255, 0.04);
    }
    .mcp-terminal__title {
      font-family: var(--font-display, 'Unbounded', 'Inter', sans-serif);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
    }
    .mcp-terminal__close {
      background: transparent;
      border: 1px solid var(--hub-border);
      color: var(--hub-muted);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: var(--font-mono, 'IBM Plex Mono', ui-monospace, monospace);
      font-size: 11px;
      cursor: pointer;
    }
    .mcp-terminal__close:hover { border-color: rgba(122, 167, 255, 0.4); color: #fff; }
    .mcp-terminal__body {
      flex: 1;
      overflow: hidden;
    }
    .mcp-terminal__body iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #05070a;
    }

    @media (max-width: 760px) {
      .orbit-node-wrap--0, .orbit-node-wrap--1, .orbit-node-wrap--2, .orbit-node-wrap--3,
      .orbit-node-wrap--4, .orbit-node-wrap--5, .orbit-node-wrap--6, .orbit-node-wrap--7 {
        transform: rotate(var(--angle)) translate(clamp(26vw, 36vh, 40vw)) rotate(calc(-1 * var(--angle)));
      }
      .spoke { display: none; }
    }
  </style>
</head>

  <script>
    (function () {
      'use strict';

      const stars = document.getElementById('stars');
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star' + (Math.random() < 0.12 ? ' star--bright' : '');
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = (Math.random() * 5) + 's';
        s.style.opacity = Math.random() * 0.4 + 0.1;
        stars.appendChild(s);
      }

      const endpoints = {
        hl: 'http://localhost:8090/health',
        desk: 'http://localhost:8100/api/health',
        brain: 'http://localhost:8086/health',
        deskEquity: 'http://localhost:8100/api/status'
      };

      function setVal(id, healthy, text) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        el.className = 'telemetry-item__value' + (healthy === false ? ' telemetry-item__value--bad' : healthy === true ? ' telemetry-item__value--ok' : '');
      }

      async function safeFetchJSON(url, fallback) {
        try {
          const r = await fetch(url, { mode: 'cors' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return await r.json();
        } catch (e) {
          return fallback;
        }
      }

      async function refresh() {
        const hl = await safeFetchJSON(endpoints.hl, { status: '' });
        const desk = await safeFetchJSON(endpoints.desk, { status: '' });
        const brain = await safeFetchJSON(endpoints.brain, { status: '' });

        setVal('svc-hl', !!hl.status, hl.status ? 'online' : 'down');
        setVal('svc-desk', !!desk.status, desk.status ? 'online' : 'down');
        setVal('svc-brain', !!brain.status, brain.status ? 'online' : 'down');

        try {
          const status = await safeFetchJSON(endpoints.deskEquity, {});
          const equity = status.equityUsd ?? status.equity ?? '—';
          const positions = status.openPositions ?? status.open ?? '—';
          const realized = status.realizedPnlUsd ?? status.realized ?? '—';
          setVal('desk-equity', null, '$' + equity);
          setVal('desk-positions', null, '' + positions);
          setVal('desk-realized', null, '$' + realized);
        } catch (e) {
          setVal('desk-equity', false, '—');
          setVal('desk-positions', false, '—');
          setVal('desk-realized', false, '—');
        }

        setVal('directives-count', null, '—');
      }

      refresh();
      setInterval(refresh, 30000);

      // spin control: each click rotates the carousel by 45° so the next node moves to top center
      const carousel = document.getElementById('orbit-carousel');
      const hubSpin = document.getElementById('hub-spin');
      let spinAngle = 0;
      if (hubSpin && carousel) {
        hubSpin.addEventListener('click', function (e) {
          e.preventDefault();
          spinAngle -= 45;
          carousel.style.transform = 'rotate(' + spinAngle + 'deg)';
        });
      }

      // functional HL MCP terminal: open the in-page terminal overlay instead of a dead stats tab
      const mcpTerminal = document.getElementById('mcp-terminal');
      const mcpClose = document.getElementById('mcp-terminal-close');
      const mcpNode = document.querySelector('.orbit-node-wrap--4 .orbit-node');
      if (mcpNode && mcpTerminal) {
        mcpNode.addEventListener('click', function (e) {
          e.preventDefault();
          mcpTerminal.classList.add('is-open');
          mcpTerminal.setAttribute('aria-hidden', 'false');
        });
      }
      if (mcpClose && mcpTerminal) {
        mcpClose.addEventListener('click', function () {
          mcpTerminal.classList.remove('is-open');
          mcpTerminal.setAttribute('aria-hidden', 'true');
        });
      }
    })();
  </script>
</body>
</html>
